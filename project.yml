name: Echo
options:
  bundleIdPrefix: com.aquila
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  Echo:
    type: application
    platform: iOS
    sources: [Echo]
    settings:
      base:
        INFOPLIST_FILE: Echo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aquila.echo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
    entitlements:
      path: Echo/Echo.entitlements
      properties:
        aps-environment: development
